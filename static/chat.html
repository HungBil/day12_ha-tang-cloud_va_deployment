<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat — Day 12 Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-chat: #12121f;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a0;
            --user-bubble: #6c63ff;
            --bot-bubble: #1e1e35;
            --border: rgba(255,255,255,0.06);
            --success: #4ade80;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-info h1 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .header-info .status {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.offline { background: var(--error); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge-model {
            background: rgba(108, 99, 255, 0.15);
            color: var(--accent);
            border: 1px solid rgba(108, 99, 255, 0.3);
        }

        .badge-live {
            background: rgba(74, 222, 128, 0.1);
            color: var(--success);
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        /* ── Chat Area ── */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot { align-self: flex-start; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .msg-avatar {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }
        .message.bot .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #a78bfa);
        }

        .msg-content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.55;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .msg-content {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .message.bot .msg-content {
            background: var(--bot-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-content p { margin-bottom: 8px; }
        .msg-content p:last-child { margin-bottom: 0; }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s ease-in-out infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* Welcome */
        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome h2 {
            color: var(--text-primary);
            font-size: 20px;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto 24px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .suggestion-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .suggestion-btn:hover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.1);
            transform: translateY(-1px);
        }

        /* ── Input Area ── */
        .input-area {
            padding: 16px 24px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--bg-chat);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
            min-height: 46px;
            max-height: 120px;
            transition: border-color 0.2s;
            line-height: 1.5;
        }

        .input-wrapper textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .send-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled {
            background: var(--bg-chat);
            cursor: not-allowed;
            transform: none;
        }

        .footer-info {
            text-align: center;
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header { padding: 12px 16px; }
            .chat-container { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 90%; }
            .badge { display: none; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h1>AI Agent — Day 12</h1>
                <div class="status">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Đang kết nối...</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <span class="badge badge-model" id="modelBadge">GPT-4o-mini</span>
            <span class="badge badge-live">● LIVE</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <div class="welcome-icon">🚀</div>
            <h2>Chào mừng đến AI Agent!</h2>
            <p>Agent được deploy trên Render với GPT-4o-mini. Hãy hỏi bất cứ điều gì!</p>
            <div class="suggestions">
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Docker là gì?</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Giải thích 12-Factor App</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Bạn là AI gì?</button>
                <button class="suggestion-btn" onclick="sendSuggestion(this)">Rate limiting hoạt động thế nào?</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Nhập câu hỏi..." rows="1"
                      onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
        <div class="footer-info">
            Nguyễn Đông Hưng — 2A202600392 · Day 12 Cloud Deployment Lab
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const modelBadge = document.getElementById('modelBadge');

        let isWaiting = false;

        // Check health on load
        fetch('/health')
            .then(r => r.json())
            .then(data => {
                statusDot.classList.remove('offline');
                statusText.textContent = `Online · ${data.checks?.llm || 'ready'}`;
                if (data.checks?.llm === 'openai') {
                    modelBadge.textContent = 'GPT-4o-mini';
                } else {
                    modelBadge.textContent = 'Mock LLM';
                }
            })
            .catch(() => {
                statusDot.classList.add('offline');
                statusText.textContent = 'Offline';
            });

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
            // Auto-resize textarea
            setTimeout(() => {
                e.target.style.height = 'auto';
                e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
            }, 0);
        }

        function sendSuggestion(btn) {
            userInput.value = btn.textContent;
            sendMessage();
        }

        function addMessage(text, role) {
            if (welcome) welcome.style.display = 'none';

            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="msg-content">${formatText(text)}</div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function addTyping() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'typingMsg';
            div.innerHTML = `
                <div class="msg-avatar">🤖</div>
                <div class="msg-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('typingMsg');
            if (t) t.remove();
        }

        function formatText(text) {
            // Basic markdown-ish formatting
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code style="background:rgba(255,255,255,0.08);padding:2px 6px;border-radius:4px;font-size:13px;">$1</code>');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isWaiting) return;

            isWaiting = true;
            sendBtn.disabled = true;
            userInput.value = '';
            userInput.style.height = 'auto';

            addMessage(text, 'user');
            addTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text }),
                });

                removeTyping();

                if (res.ok) {
                    const data = await res.json();
                    addMessage(data.answer, 'bot');
                } else if (res.status === 429) {
                    addMessage('⚠️ Bạn gửi quá nhanh rồi! Đợi 1 phút nhé.', 'bot');
                } else {
                    const err = await res.json().catch(() => ({}));
                    addMessage(`❌ Lỗi: ${err.detail || 'Không xác định'}`, 'bot');
                }
            } catch (e) {
                removeTyping();
                addMessage('❌ Không thể kết nối tới server.', 'bot');
            }

            isWaiting = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    </script>
</body>
</html>
